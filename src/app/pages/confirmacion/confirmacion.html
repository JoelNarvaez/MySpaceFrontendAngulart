<section class="min-h-screen bg-stone-50 flex items-center justify-center py-16 px-8">
  <div class="bg-white rounded-2xl shadow-md p-10 max-w-lg w-full text-center">


    <h1 class="text-3xl font-light text-stone-700 mb-2 tracking-widest">¡CITA CONFIRMADA!</h1>
    <p class="text-stone-400 mb-8">Te esperamos con gusto</p>

    <!-- Resumen -->
    <div class="bg-stone-50 rounded-xl p-6 text-left mb-8">
      <div class="flex justify-between py-3 border-b border-stone-100">
        <span class="text-stone-400 text-sm">Nombre</span>
        <span class="text-stone-700 font-medium">{{ nombre }}</span>
      </div>
      <div class="flex justify-between py-3 border-b border-stone-100">
        <span class="text-stone-400 text-sm">Servicio</span>
        <span class="text-stone-700 font-medium">{{ servicio }}</span>
      </div>
      <div class="flex justify-between py-3 border-b border-stone-100">
        <span class="text-stone-400 text-sm">Fecha</span>
        <span class="text-stone-700 font-medium">{{ fecha }}</span>
      </div>
      <div class="flex justify-between py-3">
        <span class="text-stone-400 text-sm">Hora</span>
        <span class="text-stone-700 font-medium">{{ hora }}</span>
      </div>
    </div>

    <!-- Botones -->
    <div class="flex gap-4">
      <button (click)="irAMisCitas()"
        class="flex-1 border border-teal-600 text-teal-600 hover:bg-teal-600 hover:text-white py-3 rounded-full transition-colors duration-300">
        Ver mis citas
      </button>
      <button (click)="irAInicio()"
        class="flex-1 bg-teal-600 hover:bg-teal-700 text-white py-3 rounded-full transition-colors duration-300">
        Ir al inicio
      </button>
    </div>

  </div>
</section>
