<section class="min-h-screen bg-stone-50 py-16 px-8">
  <div class="max-w-3xl mx-auto">

    @if (!servicio()) {
      <p class="text-center text-stone-400">Cargando servicio...</p>
    } @else {

      <button (click)="router.navigate(['/servicios'])"
        class="text-teal-600 hover:text-teal-800 mb-8 flex items-center gap-2">
        Regresar a servicios
      </button>

      <div class="bg-white rounded-2xl shadow-md overflow-hidden">
        <div class="h-64 bg-teal-100 flex items-center justify-center">
          <span class="text-8xl">*</span>
        </div>

        <div class="p-8">
          <h1 class="text-3xl font-light text-stone-700 mb-4">{{ servicio()?.nombre }}</h1>
          <p class="text-stone-500 mb-6 leading-relaxed">{{ servicio()?.descripcion }}</p>

          <div class="flex gap-8 mb-8">
            <div class="text-center">
              <p class="text-stone-400 text-sm mb-1">Precio</p>
              <p class="text-teal-600 text-2xl font-semibold">{{ servicio()?.precio | precioMxn }}</p>
            </div>
            <div class="text-center">
              <p class="text-stone-400 text-sm mb-1">Duracion</p>
              <p class="text-stone-700 text-2xl font-semibold">{{ servicio()?.duracion_min }} min</p>
            </div>
          </div>

          <button (click)="irAgendar()"
            class="w-full bg-teal-600 hover:bg-teal-700 text-white py-3 rounded-full text-lg transition-colors duration-300">
            Agendar este servicio
          </button>
        </div>

      </div>
    }
  </div>
</section>
