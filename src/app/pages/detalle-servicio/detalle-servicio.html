<section class="min-h-screen bg-[#F5F5F4] py-16 px-8">
  <div class="max-w-4xl mx-auto">

    @if (!servicio()) {
      <div class="flex justify-center py-20">
        <div class="animate-pulse text-[#1E3A5F] logo-font text-xl uppercase tracking-widest">Preparando tu experiencia...</div>
      </div>
    } @else {

      <button (click)="router.navigate(['/servicios'])"
        class="group text-[#1E3A5F] hover:text-[#D4A373] mb-10 flex items-center gap-2 transition-all font-bold text-xs uppercase tracking-widest">
        <span class="group-hover:-translate-x-1 transition-transform">←</span> 
        Regresar a servicios
      </button>

      <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        
        <div class="h-80 bg-[#1E3A5F] relative flex items-center justify-center overflow-hidden">
          <div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
          <span class="text-white/20 text-[12rem] logo-font select-none">MS</span>
          <div class="absolute bottom-0 left-0 w-full h-24 bg-gradient-to-t from-white to-transparent"></div>
        </div>

        <div class="p-10 md:p-16 -mt-12 relative bg-white rounded-t-[3rem]">
          <div class="flex flex-col md:flex-row md:items-start justify-between gap-6 mb-8">
            <div>
              <h1 class="logo-font text-4xl md:text-5xl text-[#1E3A5F] mb-2">{{ servicio()?.nombre }}</h1>
              <div class="h-1 w-20 bg-[#D4A373]"></div>
            </div>
            
            <div class="flex flex-col items-end">
              <span class="text-[#D4A373] text-[10px] font-bold uppercase tracking-[0.3em]">Inversión</span>
              <p class="text-[#1E3A5F] text-4xl font-black">{{ servicio()?.precio | precioMxn }}</p>
            </div>
          </div>

          <p class="text-gray-600 mb-10 text-lg leading-relaxed font-light">
            {{ servicio()?.descripcion }}
          </p>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <div class="flex items-center gap-4 p-6 bg-[#F5F5F4] rounded-2xl border border-gray-100">
              <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm text-[#D4A373]">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
              </div>
              <div>
                <p class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Duración estimada</p>
                <p class="text-[#1E3A5F] font-bold text-xl">{{ servicio()?.duracion_min }} minutos</p>
              </div>
            </div>

            <div class="flex items-center gap-4 p-6 bg-[#F5F5F4] rounded-2xl border border-gray-100">
              <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm text-[#D4A373]">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
              </div>
              <div>
                <p class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Incluye</p>
                <p class="text-[#1E3A5F] font-bold text-xl">Atención Premium</p>
              </div>
            </div>
          </div>

          <button (click)="irAgendar()"
            class="w-full bg-[#1E3A5F] hover:bg-[#D4A373] text-white py-5 rounded-full text-sm font-bold uppercase tracking-[0.2em] transition-all duration-500 shadow-xl hover:-translate-y-1 active:scale-95">
            Reservar Experiencia Ahora
          </button>
        </div>

      </div>
    }
  </div>
</section>
