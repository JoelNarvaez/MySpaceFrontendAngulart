<section class="min-h-screen bg-stone-50 py-16 px-8">
  <div class="max-w-5xl mx-auto">

    <h1 class="text-4xl text-center text-stone-700 font-light mb-2 tracking-widest">CONTACTO</h1>
    <p class="text-center text-stone-400 mb-12">Estamos para ayudarte</p>

    <div class="grid grid-cols-2 gap-12">

      <!-- Info de contacto -->
      <div>
        <h2 class="text-2xl font-light text-stone-700 mb-8">Encuéntranos</h2>

        <div class="flex flex-col gap-6">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-teal-100 rounded-full flex items-center justify-center text-xl">📍</div>
            <div>
              <p class="text-stone-700 font-medium">Dirección</p>
              <p class="text-stone-400 text-sm">Av. Bienestar 123, Col. Serenidad</p>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-teal-100 rounded-full flex items-center justify-center text-xl">📞</div>
            <div>
              <p class="text-stone-700 font-medium">Teléfono</p>
              <p class="text-stone-400 text-sm">449 123 4567</p>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-teal-100 rounded-full flex items-center justify-center text-xl">📧</div>
            <div>
              <p class="text-stone-700 font-medium">Email</p>
              <p class="text-stone-400 text-sm">contacto@serenityspa.com</p>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-teal-100 rounded-full flex items-center justify-center text-xl">🕐</div>
            <div>
              <p class="text-stone-700 font-medium">Horarios</p>
              <p class="text-stone-400 text-sm">Lunes a Sábado: 9:00 - 19:00</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Formulario template  -->
      <div class="bg-white rounded-2xl shadow-md p-8">
        <h2 class="text-2xl font-light text-stone-700 mb-6">Envíanos un mensaje</h2>

        <form (ngSubmit)="enviarMensaje()">

          <div class="mb-6">
            <label class="block text-stone-600 text-sm mb-2">Nombre</label>
            <input type="text" [(ngModel)]="nombre" name="nombre"
              placeholder="Tu nombre completo"
              class="w-full border border-stone-300 rounded-full px-4 py-3 focus:outline-none focus:border-teal-500 transition-colors"/>
          </div>

          <div class="mb-6">
            <label class="block text-stone-600 text-sm mb-2">Correo electrónico</label>
            <input type="email" [(ngModel)]="email" name="email"
              placeholder="ejemplo@correo.com"
              class="w-full border border-stone-300 rounded-full px-4 py-3 focus:outline-none focus:border-teal-500 transition-colors"/>
          </div>

          <div class="mb-8">
            <label class="block text-stone-600 text-sm mb-2">Mensaje</label>
            <textarea [(ngModel)]="mensaje" name="mensaje"
              placeholder="¿En qué podemos ayudarte?"
              rows="4"
              class="w-full border border-stone-300 rounded-2xl px-4 py-3 focus:outline-none focus:border-teal-500 transition-colors resize-none"></textarea>
          </div>

          <button type="submit"
            class="w-full bg-teal-600 hover:bg-teal-700 text-white py-3 rounded-full text-lg transition-colors duration-300 cursor-pointer">
            Enviar mensaje
          </button>

        </form>
      </div>

    </div>
  </div>
</section>
