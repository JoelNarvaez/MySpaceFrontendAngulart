<div class="grid grid-cols-3 gap-3">
  @for (horario of horarios; track horario.hora) {
    <button
      (click)="seleccionar(horario)"
      [disabled]="!horario.disponible"
      [class]="horario.disponible
        ? 'py-2 rounded-full border border-teal-500 text-teal-600 hover:bg-teal-600 hover:text-white transition-colors duration-300'
        : 'py-2 rounded-full border border-stone-200 text-stone-300 cursor-not-allowed bg-stone-50'">
      {{ horario.hora }}
    </button>
  }
</div>
