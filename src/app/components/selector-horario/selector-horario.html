<div class="grid grid-cols-3 gap-4">
  @for (horario of horarios; track horario.hora) {
    <button
      (click)="seleccionar(horario)"
      [disabled]="!horario.disponible"
      [class]="horario.disponible
        ? 'py-3 rounded-full border border-[#1E3A5F] text-[#1E3A5F] font-bold text-xs uppercase tracking-widest hover:bg-[#D4A373] hover:border-[#D4A373] hover:text-white transition-all duration-300 shadow-sm active:scale-95'
        : 'py-3 rounded-full border border-gray-200 text-gray-300 cursor-not-allowed bg-gray-50 opacity-50 text-xs uppercase tracking-widest'">
      {{ horario.hora }}
    </button>
  }
</div>
