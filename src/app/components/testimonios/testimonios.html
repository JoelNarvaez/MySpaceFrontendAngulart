<section class="py-24 px-6 bg-white">
  <div class="max-w-3xl mx-auto text-center">

    <div appReveal class="mb-16">
      <h2 class="logo-font text-3xl md:text-4xl text-[#1E3A5F] uppercase tracking-widest mb-3">
        Lo que dicen nuestros clientes<span class="text-[#D4A373]">.</span>
      </h2>
      <div class="h-[1px] w-16 bg-[#D4A373] mx-auto mt-3"></div>
    </div>

    <div appReveal [delay]="'100ms'">

      <div class="bg-[#F9F9F9] border border-[#E8E5E0] rounded-2xl px-10 py-12 shadow-sm transition-all duration-500 min-h-[220px] flex flex-col justify-center">

        <div class="flex justify-center gap-1 mb-6">
          @for (star of [1,2,3,4,5]; track star) {
            <svg class="w-5 h-5 text-[#D4A373]" fill="currentColor" viewBox="0 0 20 20">
              <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
            </svg>
          }
        </div>

        <p class="text-[#4A4A4A] text-base leading-relaxed italic mb-8">
          "{{ testimonios[indice()].texto }}"
        </p>

        <p class="text-[#1E3A5F] font-bold uppercase tracking-widest text-sm">
          — {{ testimonios[indice()].nombre }}
        </p>

      </div>

      <div class="flex justify-center gap-3 mt-8">
        @for (t of testimonios; track $index) {
          <button
            (click)="setIndice($index)"
            [ngClass]="$index === indice()
              ? 'bg-[#1E3A5F] w-6'
              : 'bg-[#D4A373] opacity-40 w-2.5'"
            class="h-2.5 rounded-full transition-all duration-300 cursor-pointer">
          </button>
        }
      </div>

    </div>
  </div>
</section>
