<nav class="bg-[#F5F5F4] border-b border-gray-200/50 sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">

    <a routerLink="/" class="flex items-center gap-3 group">
      <img src="logoMySpace.png" alt="Logo My Space" class="h-12 w-auto object-contain">

      <div class="flex flex-col leading-none">
        <span class="logo-font text-2xl text-[#1E3A5F] tracking-tight group-hover:opacity-80 transition-opacity">
          MY SPACE<span class="text-[#D4A373]">.</span>
        </span>
        <span class="text-[9px] uppercase tracking-[0.2em] text-[#6B7280] mt-1 font-semibold">
          Massage Therapy
        </span>
      </div>
    </a>

    <div class="hidden md:flex items-center gap-10">
      <ul class="flex gap-8 list-none p-0 m-0">
        <li><a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Inicio</a></li>
        <li><a routerLink="/servicios" routerLinkActive="active-link" class="nav-link">Servicios</a></li>
        <li><a routerLink="/nosotros" routerLinkActive="active-link" class="nav-link">Nosotros</a></li>
        <li><a routerLink="/contacto" routerLinkActive="active-link" class="nav-link">Contacto</a></li>
      </ul>

      <div class="flex items-center gap-4 ml-4">
        @if (authService.estaAutenticado()) {
          @if (!authService.esAdmin()) {
            <button (click)="irAgendar()" class="btn-gold">Agendar Cita</button>
          }
          
          <div class="flex items-center gap-3 pl-6 border-l border-gray-200">
            <span class="text-xs font-bold text-[#1F2937] uppercase tracking-tighter">
              {{ authService.usuario()?.nombre || 'User' }}
            </span>
            <button (click)="authService.logout()" class="text-[10px] font-black text-red-500 hover:text-red-700 uppercase">Salir</button>
          </div>
        } @else {
          <a routerLink="/login" class="btn-login">Ingresar</a>
          <button (click)="irAgendar()" class="btn-gold">Agendar</button>
        }
      </div>
    </div>

    <button (click)="toggleMobileMenu()" class="md:hidden text-[#1E3A5F]">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="isMobileMenuOpen ? 'M6 18L18 6M6 6l12 12' : 'M4 6h16M4 12h16M4 18h16'"></path>
      </svg>
    </button>
  </div>

  @if (isMobileMenuOpen) {
    <div class="md:hidden bg-[#F5F5F4] animate-in fade-in slide-in-from-top-2 duration-300">
      <div class="flex flex-col">
        <a routerLink="/" (click)="isMobileMenuOpen=false" class="mobile-link">Inicio</a>
        <a routerLink="/servicios" (click)="isMobileMenuOpen=false" class="mobile-link">Servicios</a>
        <a routerLink="/contacto" (click)="isMobileMenuOpen=false" class="mobile-link">Contacto</a>
        <div class="p-6">
          <button (click)="irAgendar()" class="w-full btn-gold text-center py-4">Agendar Cita</button>
        </div>
      </div>
    </div>
  }
</nav>
